// ElasticMQ config for local dev — emulates AWS SQS for the engine worker.
// Mounted into the elasticmq container at /opt/elasticmq.conf.
include classpath("application.conf")

node-address {
  protocol = http
  host = "*"
  port = 9324
  context-path = ""
}

rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0"
  // Use SQS-compatible URLs so boto3 sees the same shape as real AWS.
  sqs-limits = strict
}

queues {
  // Pre-declare the FIFO queue the engine worker polls. Backend uses MessageDeduplicationId,
  // so contentBasedDeduplication stays false.
  "engine-jobs.fifo" {
    fifo = true
    contentBasedDeduplication = false
    defaultVisibilityTimeout = 30 seconds
  }
}
